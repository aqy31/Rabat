<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel d'épigraphie akkadienne | Digital Archive</title>
    <style>
        :root { 
            --paper-bg: #f5f3ee; 
            --card-bg: #ffffff; 
            --ink-main: #2b2b2b; 
            --ink-muted: #5c5c5c; 
            --ink-pale: #8a857d; 
            --accent-academic: #5e2124; 
            --border-color: #d8d4cb; 
            --tag-bg: #eaddc5; 
            --phonetic-bg: #e3e8ed;
            --phonetic-text: #1e3a5f;
        }

        @font-face { font-family: 'OldBabylonianFont'; src: url('OldBabylonian.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'AssyrianFont'; src: url('Assyria.ttf') format('truetype'); font-display: swap; }

        body { font-family: "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif; background-color: var(--paper-bg); color: var(--ink-main); margin: 0; padding: 0; line-height: 1.6; }
        header { background-color: var(--paper-bg); padding: 40px 15px 25px; text-align: center; border-bottom: 1px solid var(--border-color); }
        header h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 2.5rem); color: var(--ink-main); font-weight: normal; }
        header p { color: var(--ink-muted); font-size: clamp(0.9rem, 2vw, 1.1rem); margin-top: 10px; font-style: italic; }
        .container { max-width: 1300px; margin: 30px auto; padding: 0 15px; }
        .search-section { margin-bottom: 30px; text-align: center; position: sticky; top: 15px; z-index: 100; }
        .search-input { width: 100%; max-width: 800px; padding: 14px 20px; font-size: 1rem; font-family: inherit; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--card-bg); color: var(--ink-main); outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: all 0.3s; }
        .search-input:focus { border-color: var(--accent-academic); box-shadow: 0 4px 20px rgba(94, 33, 36, 0.15); }
        .counter-text { margin-top: 8px; color: var(--ink-pale); font-size: 0.9rem; font-weight: bold; }
        
        .dictionary-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .dictionary-grid { grid-template-columns: repeat(2, 1fr); } } 
        @media (min-width: 1200px) { .dictionary-grid { grid-template-columns: repeat(2, 1fr); gap: 30px; } }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; display: flex; flex-direction: column; transition: border-color 0.2s, transform 0.2s; overflow: hidden; }
        .card:hover { border-color: var(--ink-pale); transform: translateY(-2px); }
        @media (min-width: 600px) { .card { flex-direction: row; } }

        .visual-column { padding: 20px 15px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: row; justify-content: space-around; gap: 15px; background-color: #faf9f6; }
        @media (min-width: 600px) { .visual-column { flex-direction: column; border-bottom: none; border-left: 1px solid var(--border-color); min-width: 140px; justify-content: center; } }
        
        .sign-variant { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .cuneiform { font-size: clamp(2.5rem, 5vw, 3.5rem); line-height: 1; color: var(--ink-main); margin-bottom: 5px; }
        .sumerian-style { font-family: "Segoe UI Historic", sans-serif; }
        .babylonian-style { font-family: 'OldBabylonianFont', serif; }
        .assyrian-style { font-family: 'AssyrianFont', serif; }
        .variant-label { font-size: 0.65rem; color: var(--ink-pale); text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        
        .content-column { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-meta { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .meta-item { font-size: 0.9rem; color: var(--accent-academic); font-weight: bold; background: #f0ebe1; padding: 2px 8px; border-radius: 3px; }
        .meta-label { color: var(--ink-muted); font-size: 0.8rem; text-transform: uppercase; }

        .phonetics-box { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .phonetics-label { font-size: 0.75rem; color: var(--accent-academic); font-weight: bold; margin-left: 5px; }
        .phonetic-tag { background-color: var(--phonetic-bg); color: var(--phonetic-text); padding: 3px 8px; border-radius: 4px; font-size: 0.85rem; font-family: "Times New Roman", serif; font-weight: bold; letter-spacing: 1px; border: 1px solid #c9d6e2; }
        
        .transliteration-box { direction: ltr; text-align: right; margin-bottom: 12px; background: #fdfdfc; padding: 10px; border-right: 3px solid var(--border-color); }
        .trans-row { margin-bottom: 4px; }
        .lang-label { font-size: 0.7rem; color: var(--ink-pale); margin-right: 10px; text-transform: uppercase; font-weight: bold; }
        .sum-val { color: var(--ink-main); font-size: 1.05rem; font-weight: bold; letter-spacing: 0.5px; }
        .akk-val { color: var(--ink-main); font-style: italic; font-size: 1.05rem; }
        
        .meaning-box { color: var(--ink-main); font-size: 0.95rem; line-height: 1.5; margin-bottom: 12px; }
        .section-title { display: block; font-size: 0.8rem; color: var(--accent-academic); margin-bottom: 4px; font-weight: bold; border-bottom: 1px dashed var(--border-color); padding-bottom: 2px; }
        
        .vocabulary-box { background-color: #fcfbf9; padding: 10px; border-radius: 3px; border: 1px solid #eee; margin-bottom: 12px; font-size: 0.9rem; color: var(--ink-muted); }
        .vocab-word { direction: ltr; display: inline-block; margin-bottom: 4px; width: 100%; word-break: break-word; }
        .vocab-cuneiform { font-family: "Segoe UI Historic", sans-serif; color: var(--ink-main); font-size: 1.1rem; }
        .vocab-trans { font-style: italic; color: var(--ink-main); }
        .vocab-arab { direction: rtl; display: inline-block; margin-left: 8px; color: #555; }
        
        .periods-box { margin-top: auto; }
        .period-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
        .period-tag { background-color: var(--tag-bg); color: var(--accent-academic); padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; font-family: inherit; border: 1px solid #dccba8; }
    </style>
</head>

            page: (item[2] || "").trim(),
            sumerian: (item[3] || "").trim(),
            akkadian: (item[4] || "").trim(),
            meaning: (item[5] || "").trim(),
            words: (Array.isArray(item[6]) ? item[6] : []).map(w =>

            ).join(''),
            periods: typeof item[7] === 'string' ? item[7].split(',').map(s=>s.trim()) : [],
            phonetics: typeof item[8] === 'string' ? item[8].split(',').map(s=>s.trim()) : []
        }));

        const grid = document.getElementById('mainGrid');
        const counter = document.getElementById('counter');

        function renderLibrary(data) {
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const periodTags = item.periods.map(p => `<span class="period-tag">${p}</span>`).join('');
                const phoneticTags = item.phonetics.map(p => `<span class="phonetic-tag">${p}</span>`).join('');

                card.innerHTML = `
                    <div class="visual-column">
                        <div class="sign-variant">
                            <div class="cuneiform sumerian-style">${item.sign}</div>
                            <span class="variant-label">سومري قديم</span>
                        </div>
                        <div class="sign-variant">
                            <div class="cuneiform babylonian-style">${item.sign}</div>
                            <span class="variant-label">بابلي قديم</span>
                        </div>
                        <div class="sign-variant">
                            <div class="cuneiform assyrian-style">${item.sign}</div>
                            <span class="variant-label">آشوري حديث</span>
                        </div>
                    </div>
                    <div class="content-column">
                        <div class="header-meta">
                            <div><span class="meta-label">Labat:</span> <span class="meta-item">${item.labat}</span></div>
                            <div><span class="meta-label">Page:</span> <span class="meta-item">${item.page}</span></div>
                        </div>
                        
                        <div class="phonetics-box">
                            <span class="phonetics-label">القيم الصوتية:</span>
                            ${phoneticTags}
                        </div>

                        <div class="transliteration-box">
                            <div class="trans-row">
                                <span class="sum-val">${item.sumerian}</span>
                                <span class="lang-label">Sumerian</span>
                            </div>
                            <div class="trans-row">
                                <span class="akk-val">${item.akkadian}</span>
                                <span class="lang-label">Akkadian</span>
                            </div>
                        </div>
                        
                        <div class="meaning-box">
                            <span class="section-title">المعنى الدلالي</span>
                            ${item.meaning}
                        </div>
                        
                        <div class="vocabulary-box">
                            <span class="section-title">أمثلة شائعة (Vocabulary)</span>
                            ${item.words}
                        </div>
                        
                        <div class="periods-box">
                            <span class="section-title">عصور التدوين (Attestations)</span>
                            <div class="period-tags">${periodTags}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            counter.innerText = `يتم عرض ${data.length} علامة مسمارية (تم التحميل بنجاح)`;
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = libraryData.filter(item => {
                return item.labat === query || 
                       item.page === query || 
                       item.sumerian.toLowerCase().includes(query) || 
                       item.akkadian.toLowerCase().includes(query) || 
                       item.meaning.includes(query) || 
                       item.phonetics.some(p => p.includes(query)) ||
                       item.sign === query;
            });
            renderLibrary(filtered);
        }

        window.onload = () => renderLibrary(libraryData);
    } catch(e) {
        document.getElementById('counter').innerText = "حدث خطأ فني أثناء التحميل: " + e.message;
    }
